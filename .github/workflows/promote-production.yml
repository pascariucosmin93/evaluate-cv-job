name: promote-production

on:
  workflow_dispatch:

jobs:
  promote-gitops:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest Docker tag
        id: version
        run: |
          latest_tag="$(git tag --list 'docker-v0.0.*' --sort=-version:refname | head -n 1)"

          if [ -z "$latest_tag" ]; then
            echo "No Docker version tag found."
            exit 1
          fi

          version="${latest_tag#docker-v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/evaluate-cv-job-gitops
          ssh-key: ${{ secrets.GITOPS_REPO_SSH_KEY }}
          path: gitops

      - name: Update GitOps image tags
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("gitops/clusters/production/evaluate-cv-job/kustomization.yaml")
          content = path.read_text()
          version = os.environ["VERSION"]
          content, count = re.subn(r"newTag:\s+\S+", f"newTag: {version}", content)
          if count != 2:
              raise SystemExit(f"Expected to update 2 image tags, updated {count}.")
          path.write_text(content)
          PY

      - name: Commit and push GitOps changes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clusters/production/evaluate-cv-job/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No GitOps changes to commit."
            exit 0
          fi
          git commit -m "Promote evaluate-cv-job ${VERSION} in GitOps"
          git push origin main
