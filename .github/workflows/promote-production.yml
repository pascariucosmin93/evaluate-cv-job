name: promote-production

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest Docker tag
        id: version
        run: |
          latest_tag="$(git tag --list 'docker-v0.0.*' --sort=-version:refname | head -n 1)"

          if [ -z "$latest_tag" ]; then
            echo "No Docker version tag found."
            exit 1
          fi

          version="${latest_tag#docker-v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Promoting version $version to latest."

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Promote images to latest
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for image in evaluate-cv-job-frontend evaluate-cv-job-backend; do
            source_image="${REGISTRY}/${IMAGE_NAMESPACE}/${image}:${VERSION}"
            latest_image="${REGISTRY}/${IMAGE_NAMESPACE}/${image}:latest"

            docker pull "$source_image"
            docker tag "$source_image" "$latest_image"
            docker push "$latest_image"
          done
