name: docker-images

on:
  push:
    branches:
      - main
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next Docker version
        id: version
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag --list 'docker-v0.0.*' --sort=-version:refname | head -n 1)"

          if [ -z "$latest_tag" ]; then
            next_version="0.0.1"
          else
            patch="${latest_tag##*.}"
            next_version="0.0.$((patch + 1))"
          fi

          echo "version=$next_version" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: ./frontend
            image: evaluate-cv-job-frontend
          - name: backend
            context: ./backend
            image: evaluate-cv-job-backend

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=ref,event=pr
            type=sha
            type=raw,value=main,enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ needs.prepare-version.outputs.version }},enable=${{ github.event_name == 'push' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tag-release:
    if: github.event_name == 'push'
    needs:
      - prepare-version
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Docker version tag
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "docker-v$VERSION"
          git push origin "docker-v$VERSION"

  update-gitops:
    if: github.event_name == 'push'
    needs:
      - prepare-version
      - build
      - tag-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/evaluate-cv-job-gitops
          ssh-key: ${{ secrets.GITOPS_REPO_SSH_KEY }}
          path: gitops

      - name: Update image tags in GitOps repo
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          python <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("gitops/clusters/production/evaluate-cv-job/kustomization.yaml")
          content = path.read_text()
          version = os.environ["VERSION"]
          content, count = re.subn(r"newTag:\s+\S+", f"newTag: {version}", content)
          if count != 2:
              raise SystemExit(f"Expected to update 2 image tags, updated {count}.")
          path.write_text(content)
          PY

      - name: Commit and push GitOps changes
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clusters/production/evaluate-cv-job/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No GitOps changes to commit."
            exit 0
          fi
          git commit -m "Deploy evaluate-cv-job images ${VERSION}"
          git push origin main
