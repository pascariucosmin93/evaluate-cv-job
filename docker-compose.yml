services:
  nginx:
    image: nginx:1.27-alpine
    container_name: evaluate-cv-job-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
    ports:
      - "3000:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - evaluate-network

  frontend:
    image: ghcr.io/pascariucosmin93/evaluate-cv-job-frontend:0.0.20
    container_name: evaluate-cv-job-frontend
    restart: unless-stopped
    depends_on:
      backend-api:
        condition: service_healthy
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_BASE_URL: http://backend-api:8080
    networks:
      - evaluate-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  backend-api:
    image: ghcr.io/pascariucosmin93/evaluate-cv-job-backend:0.0.20
    container_name: evaluate-cv-job-backend-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
    environment:
      PORT: 8080
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    networks:
      - evaluate-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  worker:
    image: ghcr.io/pascariucosmin93/evaluate-cv-job-backend:0.0.20
    container_name: evaluate-cv-job-worker
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    depends_on:
      redis:
        condition: service_started
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      LOG_LEVEL: info
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-180000}
    networks:
      - evaluate-network

  redis:
    image: redis:7-alpine
    container_name: evaluate-cv-job-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - evaluate-network

  ollama:
    image: ollama/ollama:latest
    container_name: evaluate-cv-job-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - evaluate-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: evaluate-cv-job-ollama-pull
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama pull "$$OLLAMA_MODEL"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - evaluate-network

networks:
  evaluate-network:
    driver: bridge

volumes:
  ollama-data:
  redis-data:
