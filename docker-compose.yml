services:
  ollama:
    image: ollama/ollama:latest
    container_name: evaluate-cv-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - evaluate-network

  ollama-pull:
    image: ollama/ollama:latest
    container_name: evaluate-cv-ollama-pull
    restart: "no"
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - |
        until ollama list >/dev/null 2>&1; do
          sleep 2
        done
        ollama pull qwen2.5:3b
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - evaluate-network

  backend:
    image: ghcr.io/pascariucosmin93/evaluate-cv-job-backend:latest
    container_name: evaluate-cv-backend
    restart: unless-stopped
    depends_on:
      - ollama
      - ollama-pull
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:3b
      OLLAMA_TIMEOUT_MS: 180000
    ports:
      - "8080:8080"
    networks:
      - evaluate-network

  frontend:
    image: ghcr.io/pascariucosmin93/evaluate-cv-job-frontend:latest
    container_name: evaluate-cv-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "2026:3000"
    networks:
      - evaluate-network

networks:
  evaluate-network:
    driver: bridge

volumes:
  ollama-data:
