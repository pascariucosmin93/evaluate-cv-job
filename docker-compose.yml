services:
  ollama:
    image: ollama/ollama:latest
    container_name: evaluate-cv-job-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      ollama pull "$OLLAMA_MODEL"
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: evaluate-cv-job-backend
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      PORT: 8080
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: evaluate-cv-job-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3000
      API_BASE_URL: http://backend:8080
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  ollama-data:
